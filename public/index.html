<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1.00001, viewport-fit=cover" />
  <title>MOUZO - Delivery en Autlán</title>
  <meta name="description" content="MOUZO - Plataforma de delivery que conecta negocios locales con la comunidad de Autlán, Jalisco." />
  <meta name="theme-color" content="#FF8C00" />
  <meta property="og:title" content="MOUZO - Delivery en Autlán" />
  <meta property="og:description" content="Conectando negocios locales con la comunidad" />
  <meta property="og:type" content="website" />
  <style>
    html, body, #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #root {
      display: flex;
      flex: 1;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #FF8C00 0%, #FF6B00 100%);
    }
    .loading-logo {
      font-size: 48px;
      font-weight: 800;
      color: white;
      margin-bottom: 16px;
    }
    .loading-text {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <noscript>Necesitas habilitar JavaScript para usar MOUZO.</noscript>
  <div id="root">
    <div class="loading-container">
      <div class="loading-logo">MOUZO</div>
      <div class="loading-text">Cargando...</div>
    </div>
  </div>
</body>
</html>
