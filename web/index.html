    html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
    #root { display: flex; }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #E8B4A8 0%, #D4A89C 100%);

    .loading-logo-svg {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    .loading-logo {
      font-size: 32px;
      font-weight: 800;
      color: white;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .loading-text {
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
